<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Links</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>
  <body>
    <main class="page-shell">
      <nav>
        <a class="nav-link" href="{{ url_for('about') }}">About</a>
      </nav>

      <section class="hero" aria-labelledby="page-title">
        <h1 id="page-title">My Links</h1>
        <p>A simple collection of favorite places around the web.</p>
      </section>

      <form class="link-form" action="{{ url_for('add_link') }}" method="post" aria-label="Add a link">
        <label class="form-label" for="link-name">Link name</label>
        <input class="form-input" id="link-name" name="name" type="text" placeholder="Portfolio" required>

        <label class="form-label" for="link-url">URL</label>
        <input class="form-input" id="link-url" name="url" type="url" placeholder="https://example.com" required>

        <button class="button" type="submit">Add link</button>
      </form>

      <ul class="link-list">
        {% for link in links %}
        <li class="link-card">
          <a href="{{ link.url }}">
            {{ link.name }}
            <span aria-hidden="true">→</span>
          </a>
          <div class="link-actions">
            <a class="edit-button" href="{{ url_for('edit_link', link_index=loop.index0) }}">Edit</a>
            <form action="{{ url_for('delete_link', link_index=loop.index0) }}" method="post">
              <button class="delete-button" type="submit">Delete</button>
            </form>
          </div>
        </li>
        {% endfor %}
      </ul>
    </main>
  </body>
</html>

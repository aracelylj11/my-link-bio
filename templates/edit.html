<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Edit Link</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>
  <body>
    <main class="page-shell">
      <nav>
        <a class="nav-link" href="{{ url_for('home') }}">← Back to links</a>
      </nav>

      <section class="hero" aria-labelledby="page-title">
        <h1 id="page-title">Edit Link</h1>
        <p>Update the site name and URL for this link card.</p>
      </section>

      <form class="link-form" action="{{ url_for('edit_link', link_index=link_index) }}" method="post" aria-label="Edit link">
        <label class="form-label" for="link-name">Link name</label>
        <input class="form-input" id="link-name" name="name" type="text" value="{{ link.name }}" required>

        <label class="form-label" for="link-url">URL</label>
        <input class="form-input" id="link-url" name="url" type="url" value="{{ link.url }}" required>

        <button class="button" type="submit">Save changes</button>
      </form>
    </main>
  </body>
</html>
